# Nginx site config for WeChat freshman assistant (Windows Server)
# 1) Replace example.com with your domain
# 2) Replace certificate paths (Windows style)
# 3) Ensure Flask/Waitress is running on 127.0.0.1:5000

server {
    listen 80;
    server_name example.com;

    # WeChat requires HTTPS, force redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate C:/certs/example.com/fullchain.pem;
    ssl_certificate_key C:/certs/example.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    # Optional: simple health check endpoint
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Proxy all app routes to Flask/Waitress
    # Includes: /, /chat, /place, /api/chat, /wechat
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 65s;
        proxy_send_timeout 65s;
    }
}
