<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的问题 - 新生人工服务</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --ink: #133047;
      --muted: #5f758b;
      --line: #d8e4ef;
      --card: #ffffff;
      --brand: #0e7ac4;
      --brand-2: #1a93de;
      --ok: #15803d;
      --warn: #c27a10;
      --done: #4b5563;
      --shadow: 0 14px 30px rgba(20, 66, 109, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(14, 122, 196, 0.2), transparent 35%),
        radial-gradient(circle at 88% 92%, rgba(26, 147, 222, 0.18), transparent 32%),
        var(--bg);
      padding: 14px;
      display: grid;
      place-items: center;
    }

    .wrap {
      width: min(980px, 100%);
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .head {
      display: grid;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .id-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .pill {
      border: 1px solid #b9d6ea;
      background: #edf7ff;
      color: #0c567f;
      border-radius: 999px;
      padding: 3px 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
    }

    label { display: block; font-size: 13px; margin: 8px 0 6px; color: #31516d; }

    input, textarea, button {
      font-family: inherit;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #c8d9e8;
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      background: #fff;
    }

    input:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(14, 122, 196, 0.14);
    }

    textarea { min-height: 96px; resize: vertical; }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 10px;
      min-height: 38px;
      padding: 0 14px;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
    }

    .btn.secondary {
      background: #eef6fc;
      color: #24557a;
      border: 1px solid #c5dced;
    }

    .status-line {
      margin-top: 8px;
      font-size: 13px;
      color: #1e5b84;
    }

    .new-hint {
      font-size: 13px;
      color: #0f5132;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 999px;
      padding: 3px 10px;
    }

    .poll-info {
      font-size: 12px;
      color: #48647e;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .item {
      border: 1px solid #d8e5f2;
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .item.new-answer {
      border-color: #4ade80;
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.18);
      animation: glow 1.2s ease-in-out 2;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.28); }
      100% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .qid { font-weight: 700; font-size: 13px; }

    .tag {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .pending { background: var(--warn); }
    .answered { background: var(--ok); }
    .closed { background: var(--done); }

    .answer {
      background: #f6fbff;
      border: 1px dashed #b9d7ec;
      border-radius: 8px;
      padding: 8px;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel head">
      <h1>我的问题</h1>
      <div class="muted">本页面采用“主动拉取”模式：问题提交后，稍后在此查看进展与答案。</div>
      <div class="id-row">
        <span class="muted">当前登录:</span>
        <span id="userInfo" class="pill">加载中</span>
        <a class="btn secondary" href="/logout">退出登录</a>
        <a class="btn secondary" href="/">返回首页</a>
      </div>
    </section>

    <section class="grid">
      <section class="panel">
        <h3>提交问题</h3>
        <label for="title">问题标题（可选）</label>
        <input id="title" type="text" placeholder="例如：校园卡补办" />

        <label for="content">问题内容</label>
        <textarea id="content" placeholder="请尽量描述清楚，方便学长快速回答"></textarea>

        <div class="row">
          <button id="submitBtn" class="btn" type="button">提交问题</button>
          <button id="refreshBtn" class="btn secondary" type="button">刷新我的问题</button>
        </div>
        <div id="submitStatus" class="status-line"></div>
      </section>

      <section class="panel">
        <h3>按编号查询（公众号提问）</h3>
        <label for="trackQid">问题编号</label>
        <input id="trackQid" type="number" placeholder="例如：123" />

        <label for="trackCode">查询码</label>
        <input id="trackCode" type="text" placeholder="例如：AB12CD34" />

        <div class="row">
          <button id="trackBtn" class="btn" type="button">查询状态</button>
        </div>
        <div id="trackStatus" class="status-line"></div>
        <div id="trackResult" class="list"></div>
      </section>
    </section>

    <section class="panel">
      <h3>我的问题（当前账号）</h3>
      <div class="muted">只显示当前登录账号提交的问题。如需查看公众号里提交的问题，请使用上方“按编号查询”。</div>
      <div class="row" style="margin-top: 8px;">
        <label class="muted" style="display:flex;align-items:center;gap:6px;">
          <input id="autoPollToggle" type="checkbox" />
          自动轮询（12秒）
        </label>
        <button id="clearHintBtn" class="btn secondary" type="button">清除提醒</button>
        <span id="newHint" class="new-hint" style="display:none;"></span>
        <span id="pollInfo" class="poll-info"></span>
      </div>
      <div id="myList" class="list"></div>
    </section>
  </main>

  <script>
    const seenKey = 'feature3_seen_answer_map';
    const autoPollKey = 'feature3_auto_poll';
    const POLL_MS = 12000;
    let seenAnswerMap = {};
    let firstMineLoadDone = false;
    let pollTimer = null;

    function statusTag(status) {
      if (status === 'answered') return '<span class="tag answered">已回答</span>';
      if (status === 'closed') return '<span class="tag closed">已关闭</span>';
      return '<span class="tag pending">处理中</span>';
    }

    function fmtTs(v) {
      const n = Number(v || 0);
      if (!n) return '-';
      try {
        return new Date(n * 1000).toLocaleString();
      } catch (err) {
        return String(v);
      }
    }

    function loadSeenMap() {
      try {
        const raw = localStorage.getItem(seenKey);
        return raw ? JSON.parse(raw) : {};
      } catch (err) {
        return {};
      }
    }

    function saveSeenMap() {
      try {
        localStorage.setItem(seenKey, JSON.stringify(seenAnswerMap));
      } catch (err) {
        // ignore quota errors
      }
    }

    function markAnswersAsSeen(items) {
      for (const item of items || []) {
        if (item.status !== 'answered') continue;
        const id = String(item.id || '');
        const answeredAt = Number(item.answered_at || 0);
        if (!id || !answeredAt) continue;
        const prev = Number(seenAnswerMap[id] || 0);
        seenAnswerMap[id] = Math.max(prev, answeredAt);
      }
      saveSeenMap();
    }

    function detectNewAnswered(items) {
      const highlightIds = new Set();
      let newCount = 0;
      for (const item of items || []) {
        if (item.status !== 'answered') continue;
        const id = String(item.id || '');
        const answeredAt = Number(item.answered_at || 0);
        if (!id || !answeredAt) continue;
        const prevSeen = Number(seenAnswerMap[id] || 0);
        if (answeredAt > prevSeen) {
          highlightIds.add(id);
          newCount += 1;
        }
        seenAnswerMap[id] = Math.max(prevSeen, answeredAt);
      }
      saveSeenMap();
      return { highlightIds, newCount };
    }

    function showNewHint(count) {
      const hintEl = document.getElementById('newHint');
      if (count > 0) {
        hintEl.style.display = 'inline-block';
        hintEl.textContent = `发现 ${count} 条新回复，已高亮显示`;
      }
    }

    function clearHint() {
      const hintEl = document.getElementById('newHint');
      hintEl.style.display = 'none';
      hintEl.textContent = '';
    }

    function updatePollInfo(text) {
      document.getElementById('pollInfo').textContent = text;
    }

    function esc(text) {
      return (text || '').replace(/[&<>"']/g, (s) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[s]));
    }

    function renderItem(item, options = {}) {
      const canClose = !!options.canClose;
      const isNewAnswer = !!options.isNewAnswer;
      const closeMode = options.closeMode || 'mine';
      const answerHtml = item.answer ? `<div class="answer">${esc(item.answer)}</div>` : '';
      const closeBtn = (canClose && item.status === 'answered')
        ? `<button class="btn secondary" data-close-id="${item.id}" data-view-code="${item.view_code || ''}" data-close-mode="${closeMode}" type="button">关闭问题</button>`
        : '';
      const itemClass = isNewAnswer ? 'item new-answer' : 'item';
      return `
        <article class="${itemClass}">
          <div class="item-top">
            <div class="qid">#${item.id} ${esc(item.title || '未命名问题')}</div>
            ${statusTag(item.status)}
          </div>
          <div>${esc(item.content || '')}</div>
          <div class="muted">查询码: ${esc(item.view_code || '-')} · 提交时间: ${esc(fmtTs(item.created_at))}</div>
          ${answerHtml}
          ${closeBtn}
        </article>
      `;
    }

    async function loadMine({ showLoading = true, source = 'manual' } = {}) {
      const listEl = document.getElementById('myList');
      if (showLoading && !listEl.innerHTML.trim()) {
        listEl.innerHTML = '<div class="muted">加载中...</div>';
      }

      try {
        const res = await fetch('/api/questions/mine');
        const data = await res.json();
        const items = data.items || [];
        if (!items.length) {
          listEl.innerHTML = '<div class="muted">暂无记录，先提交一个问题吧。</div>';
          if (source !== 'poll') {
            clearHint();
          }
          updatePollInfo(`最近刷新：${new Date().toLocaleTimeString()}`);
          return;
        }

        let highlightIds = new Set();
        let newCount = 0;
        if (!firstMineLoadDone) {
          markAnswersAsSeen(items);
          firstMineLoadDone = true;
        } else {
          const result = detectNewAnswered(items);
          highlightIds = result.highlightIds;
          newCount = result.newCount;
        }

        listEl.innerHTML = items.map((it) => renderItem(it, { canClose: true, isNewAnswer: highlightIds.has(String(it.id)), closeMode: 'mine' })).join('');
        if (newCount > 0) {
          showNewHint(newCount);
        } else if (source !== 'poll') {
          clearHint();
        }
        updatePollInfo(`最近刷新：${new Date().toLocaleTimeString()}${source === 'poll' ? '（自动）' : ''}`);
      } catch (err) {
        if (source !== 'poll') {
          listEl.innerHTML = '<div class="muted">加载失败，请稍后重试。</div>';
        }
        updatePollInfo('刷新失败，请检查网络。');
      }
    }

    async function submitQuestion() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const statusEl = document.getElementById('submitStatus');

      if (!content) {
        statusEl.textContent = '请先输入问题内容。';
        return;
      }

      statusEl.textContent = '提交中...';
      try {
        const res = await fetch('/api/questions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ title, content }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || '提交失败';
          return;
        }

        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        statusEl.textContent = `提交成功：问题 #${data.id}，查询码 ${data.view_code}`;
        await loadMine({ showLoading: false, source: 'manual' });
      } catch (err) {
        statusEl.textContent = '网络异常，请稍后重试。';
      }
    }

    async function trackQuestion() {
      const qid = document.getElementById('trackQid').value.trim();
      const code = document.getElementById('trackCode').value.trim().toUpperCase();
      const statusEl = document.getElementById('trackStatus');
      const resultEl = document.getElementById('trackResult');

      if (!qid || !code) {
        statusEl.textContent = '请输入问题编号和查询码。';
        return;
      }

      statusEl.textContent = '查询中...';
      resultEl.innerHTML = '';

      try {
        const res = await fetch(`/api/questions/track?qid=${encodeURIComponent(qid)}&code=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.error || '未查到记录';
          return;
        }
        statusEl.textContent = '查询成功';
        resultEl.innerHTML = renderItem(data, { canClose: true, closeMode: 'track' });
      } catch (err) {
        statusEl.textContent = '查询失败，请稍后重试。';
      }
    }

    async function closeQuestion(questionId, viewCode, mode = 'mine') {
      const payload = { view_code: viewCode || '' };
      try {
        const res = await fetch(`/api/questions/${questionId}/close`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || '关闭失败');
          return;
        }
        if (mode === 'track') {
          await trackQuestion();
        } else {
          await loadMine({ showLoading: false, source: 'manual' });
        }
      } catch (err) {
        alert('关闭失败，请稍后重试。');
      }
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => {
        loadMine({ showLoading: false, source: 'poll' });
      }, POLL_MS);
    }

    function setAutoPoll(enabled) {
      localStorage.setItem(autoPollKey, enabled ? '1' : '0');
      if (enabled) {
        startPolling();
      } else {
        stopPolling();
      }
      updatePollInfo(enabled ? `自动轮询已开启（${POLL_MS / 1000}秒）` : '自动轮询已关闭');
    }

    function isAutoPollEnabled() {
      const raw = localStorage.getItem(autoPollKey);
      return raw === null ? true : raw === '1';
    }

    function bindEvents() {
      document.getElementById('submitBtn').addEventListener('click', submitQuestion);
      document.getElementById('refreshBtn').addEventListener('click', () => loadMine({ showLoading: false, source: 'manual' }));
      document.getElementById('trackBtn').addEventListener('click', trackQuestion);
      document.getElementById('clearHintBtn').addEventListener('click', clearHint);
      document.getElementById('autoPollToggle').addEventListener('change', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLInputElement)) return;
        setAutoPoll(target.checked);
      });

      document.getElementById('myList').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const qid = target.getAttribute('data-close-id');
        if (!qid) return;
        const code = target.getAttribute('data-view-code') || '';
        const mode = target.getAttribute('data-close-mode') || 'mine';
        closeQuestion(Number(qid), code, mode);
      });

      document.getElementById('trackResult').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const qid = target.getAttribute('data-close-id');
        if (!qid) return;
        const code = target.getAttribute('data-view-code') || '';
        const mode = target.getAttribute('data-close-mode') || 'track';
        closeQuestion(Number(qid), code, mode);
      });
    }

    async function loadMe() {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (!res.ok) {
          document.getElementById('userInfo').textContent = '未登录';
          return;
        }
        const user = data.user || {};
        const name = user.name || user.student_code || '已登录用户';
        document.getElementById('userInfo').textContent = name;
      } catch (err) {
        document.getElementById('userInfo').textContent = '加载失败';
      }
    }

    (async function init() {
      seenAnswerMap = loadSeenMap();
      const autoEnabled = isAutoPollEnabled();
      const autoToggle = document.getElementById('autoPollToggle');
      autoToggle.checked = autoEnabled;
      bindEvents();
      await loadMe();
      await loadMine({ showLoading: true, source: 'manual' });
      if (autoEnabled) {
        startPolling();
      }
    })();
  </script>
</body>
</html>
