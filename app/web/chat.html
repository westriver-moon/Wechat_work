<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新生智能问答助手</title>
  <style>
    :root {
      --bg: #f7f8f5;
      --paper: #fffdf8;
      --ink: #1a2f26;
      --muted: #5f746a;
      --accent: #1f8a70;
      --accent-2: #f4a261;
      --line: #dde7e1;
      --shadow: 0 10px 28px rgba(31, 138, 112, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 10%, rgba(31, 138, 112, 0.25), transparent 35%),
        radial-gradient(circle at 95% 85%, rgba(244, 162, 97, 0.25), transparent 35%),
        var(--bg);
      padding: 16px;
    }

    .chat {
      width: min(860px, 100%);
      height: min(90vh, 760px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, rgba(31, 138, 112, 0.12), rgba(244, 162, 97, 0.1));
    }

    .head h1 {
      margin: 0;
      font-size: 18px;
    }

    .head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .head-nav {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .head-link {
      text-decoration: none;
      font-size: 12px;
      color: #0d3b2f;
      background: #e8f4ef;
      border: 1px solid #c6ddd4;
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 700;
    }

    .messages {
      padding: 14px;
      overflow: auto;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .msg {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
      animation: pop 0.18s ease;
    }

    .msg.user {
      justify-self: end;
      background: #d4efe5;
      border: 1px solid #bfdfd3;
    }

    .msg.bot {
      justify-self: start;
      background: #fff;
      border: 1px solid var(--line);
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      background: #fff;
    }

    textarea {
      resize: none;
      min-height: 44px;
      max-height: 140px;
      border: 1px solid #cddad2;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 138, 112, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), #2aa889);
      cursor: pointer;
    }

    @keyframes pop {
      from { transform: translateY(6px); opacity: 0.6; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 640px) {
      .chat { height: 92vh; }
      .msg { max-width: 90%; }
      .composer { grid-template-columns: 1fr; }
      button { min-height: 42px; }
    }
  </style>
</head>
<body>
  <main class="chat">
    <header class="head">
      <h1>新生智能问答助手</h1>
      <p>支持选课、宿舍、校园网、食堂、图书馆等问题咨询</p>
      <div class="head-nav">
        <a class="head-link" href="/">返回主页</a>
        <a class="head-link" href="/place">进入地图查询</a>
        <a class="head-link" href="/freshman">我的问题</a>
        <a class="head-link" href="/logout">退出登录</a>
      </div>
    </header>

    <section id="messages" class="messages"></section>

    <section class="composer">
      <textarea id="input" placeholder="请输入你的问题... (Enter 发送 / Shift+Enter 换行)"></textarea>
      <button id="sendBtn" type="button">发送</button>
    </section>
  </main>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const question = inputEl.value.trim();
      if (!question) return;

      addMessage('user', question);
      inputEl.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!res.ok) {
          throw new Error('请求失败');
        }

        const data = await res.json();
        addMessage('bot', data.answer || '抱歉，暂时无法回答这个问题。');
      } catch (err) {
        addMessage('bot', '网络异常，请稍后再试。');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage('bot', '你好，我是新生助手。你可以直接输入问题进行问答。');
  </script>
</body>
</html>
